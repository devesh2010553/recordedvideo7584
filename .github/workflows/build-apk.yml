name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Generate Android project
        shell: bash
        run: |
          mkdir -p android-apk/app/src/main/java/com/brajwasi/pulselocation
          mkdir -p android-apk/app/src/main/res/values

          echo '' | base64 -d > android-apk/settings.gradle

          echo 'cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguNS4yJyBhcHBseSBmYWxzZQp9Cg==' | base64 -d > android-apk/build.gradle

          echo '' | base64 -d > android-apk/app/build.gradle

          echo '' | base64 -d > android-apk/app/src/main/AndroidManifest.xml

          echo '' | base64 -d > android-apk/app/src/main/res/values/styles.xml

          echo '' | base64 -d > android-apk/app/src/main/java/com/brajwasi/pulselocation/MainActivity.java

      - name: Build debug APK
        run: gradle --no-daemon -p android-apk assembleDebug

      - name: Rename APK
        run: cp android-apk/app/build/outputs/apk/debug/app-debug.apk Pulse-Location.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pulse-Location-APK
          path: Pulse-Location.apk
          if-no-files-found: error
          retention-days: 30
